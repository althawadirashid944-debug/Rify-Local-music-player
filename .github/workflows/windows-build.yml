name: Build Rify Windows

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4


      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-pip
            mingw-w64-ucrt-x86_64-python-gobject
            mingw-w64-ucrt-x86_64-gtk4


      - name: Prepare runtime folders
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force runtime\gtk\bin | Out-Null
          New-Item -ItemType Directory -Force runtime\gtk\share | Out-Null
          New-Item -ItemType Directory -Force runtime\gtk\lib\girepository-1.0 | Out-Null
          New-Item -ItemType Directory -Force runtime\mpv | Out-Null


      - name: Copy GTK runtime
        shell: powershell
        run: |

          xcopy C:\msys64\ucrt64\bin runtime\gtk\bin /E /I /Y

          xcopy C:\msys64\ucrt64\share runtime\gtk\share /E /I /Y

          xcopy C:\msys64\ucrt64\lib\girepository-1.0 runtime\gtk\lib\girepository-1.0 /E /I /Y


      - name: Check GTK typelibs
        shell: powershell
        run: |
          dir runtime\gtk\lib\girepository-1.0


      - name: Extract mpv
        shell: powershell
        run: |
          if (!(Test-Path "runtime\mpv\mpv.7z")) {
              Write-Error "mpv.7z missing!"
              exit 1
          }

          7z x runtime\mpv\mpv.7z -oruntime\mpv -y


      - name: Build Rify
        shell: msys2 {0}
        run: |

          python -m pip install --upgrade pip

          python -m pip install -r requirements.txt

          python -m pip install pyinstaller


          python -m PyInstaller \
            --windowed \
            --onedir \
            --name Rify \
            --collect-all gi \
            --hidden-import=gi.repository.Gtk \
            --hidden-import=gi.repository.GLib \
            main.py


      - name: Copy mpv
        shell: powershell
        run: |

          Copy-Item runtime\mpv\*.dll dist\Rify\ -ErrorAction SilentlyContinue

          Copy-Item runtime\mpv\**\*.dll dist\Rify\ -ErrorAction SilentlyContinue


      - name: Copy GTK files
        shell: powershell
        run: |

          New-Item -ItemType Directory -Force dist\Rify\bin | Out-Null
          New-Item -ItemType Directory -Force dist\Rify\share | Out-Null
          New-Item -ItemType Directory -Force dist\Rify\lib\girepository-1.0 | Out-Null


          Copy-Item runtime\gtk\bin\*.dll `
            dist\Rify\bin `
            -Force `
            -ErrorAction SilentlyContinue


          Copy-Item runtime\gtk\share `
            dist\Rify\share `
            -Recurse `
            -Force


          Copy-Item runtime\gtk\lib\girepository-1.0 `
            dist\Rify\lib\girepository-1.0 `
            -Recurse `
            -Force


      - name: Package Rify
        shell: powershell
        run: |

          Compress-Archive `
            -Path dist\Rify\* `
            -DestinationPath Rify-Windows.zip


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rify-Windows
          path: Rify-Windows.zip 